<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoucherPay Ultimate - TEST MODUS</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151b2c;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-card { background-color: var(--card-bg); border: 2px dashed var(--warning); border-radius: 24px; padding: 40px; width: 100%; max-width: 440px; }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; justify-content: center; }
        .brand i { font-size: 28px; color: var(--warning); }
        .brand h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .brand span { color: var(--warning); }
        .intro-text { text-align: center; margin-bottom: 28px; }
        .intro-text h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--warning); }
        .intro-text p { color: var(--text-muted); font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--text-muted); }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 16px; color: var(--text-muted); font-size: 16px; }
        .form-group input { width: 100%; padding: 14px 16px 14px 48px; background-color: #1e2640; border: 1px solid #2e3a5f; border-radius: 12px; color: var(--text-main); font-size: 15px; }
        .btn-submit { width: 100%; padding: 14px; background-color: var(--warning); color: #000; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 24px; }
        .status-box { margin-top: 20px; padding: 12px 16px; border-radius: 12px; font-size: 14px; display: none; align-items: center; gap: 10px; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="auth-card">
    <div class="brand">
        <i class="fa-solid fa-bug"></i>
        <h1>VoucherPay<span> TEST</span></h1>
    </div>

    <div class="intro-text">
        <h2>Fehlersuche aktiv</h2>
        <p>Bitte drücke F12 für die Konsole und logge dich ein.</p>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Nutzername (wird geprüft)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Nutzername eingeben" required>
            </div>
        </div>

        <div class="form-group" style="opacity: 0.5;">
            <label for="password">Passwort (wird im Test ignoriert)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="••••••••" value="test">
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
            Datenbank testen
        </button>
    </form>

    <div id="statusBox" class="status-box">
        <i id="statusIcon"></i>
        <span id="statusText"></span>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://cilvtkbochcuanmakrgq.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_coOF7Q0OugnqGltdZ5P3Vw_IEa5PRwd"; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginForm = document.getElementById('loginForm');
    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    const submitBtn = document.getElementById('submitBtn');

    function showStatus(bg, color, text) {
        statusBox.style.display = "flex";
        statusBox.style.backgroundColor = bg;
        statusBox.style.color = color;
        statusText.innerText = text;
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const inputUsername = document.getElementById('username').value.trim();
        submitBtn.disabled = true;
        showStatus("rgba(245, 158, 11, 0.1)", "var(--warning)", "Suche in Supabase...");

        console.log("=== START DATENBANK TEST ===");
        console.log("1. Wir suchen nach dem Nutzernamen:", inputUsername);

        try {
            // WIR FRAGEN NUR DEN NUTZERNAMEN AB, KEIN PASSWORT!
            const { data, error } = await supabaseClient
                .from('accounts') 
                .select('*')
                .eq('username', inputUsername);

            console.log("2. Supabase hat geantwortet!");
            
            if (error) {
                console.error("FEHLER BEI DER ABFRAGE:", error);
                showStatus("rgba(239, 68, 68, 0.1)", "var(--danger)", "Es gab einen echten Fehler. Siehe Konsole.");
            } else {
                console.log("3. Die gefundenen Daten sind:", data);
                
                if (data.length === 0) {
                    console.log("ERGEBNIS: Die Liste ist leer []. Der Nutzername steht so nicht in der Spalte 'username' der Tabelle 'accounts'.");
                    showStatus("rgba(239, 68, 68, 0.1)", "var(--danger)", "Nicht gefunden! Schau in die Konsole (F12).");
                } else {
                    console.log("ERGEBNIS: TREFFER! Hier sind die Daten aus deiner Tabelle:");
                    console.log(data[0]);
                    showStatus("rgba(16, 185, 129, 0.1)", "var(--accent)", "Nutzer gefunden! Schau in die Konsole (F12).");
                }
            }
        } catch (err) {
            console.error("KRITISCHER FEHLER:", err);
        }
        
        console.log("=== ENDE DATENBANK TEST ===");
        submitBtn.disabled = false;
    });
</script>

</body>
</html>
